<!-- @dsCard group="Components" name="Components" subtitle="Buttons · inputs · badges · empty/error/loading — light & dark" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AgentShield — Components</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{display:grid;grid-template-columns:1fr 1fr;min-height:100vh}
  .pane{padding:26px}
  .light{background:#f7f8fa;color:#0f172a;--surface:#fff;--field:#fff;--border:#e6e8ec;--muted:#5b6675;--faint:#94a3b8;--accent:#0f766e;--accent-fg:#fff;
    --crit-fg:#e11d48;--crit-bg:#fff1f2;--crit-bd:#fecdd3;--err-fg:#e11d48;--err-bg:#fff1f2;--err-bd:#fecdd3}
  .dark{background:#0a0e14;color:#e6edf3;--surface:#121821;--field:#0d141d;--border:#232b37;--muted:#8b98a9;--faint:#5b6675;--accent:#2dd4bf;--accent-fg:#042f2e;
    --crit-fg:#fb7185;--crit-bg:rgba(244,63,94,.13);--crit-bd:rgba(244,63,94,.32);--err-fg:#fda4af;--err-bg:rgba(244,63,94,.13);--err-bd:rgba(244,63,94,.32)}
  h1{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);font-weight:600;margin:0 0 14px}
  h2{font-size:11px;font-weight:600;color:var(--muted);margin:20px 0 9px}
  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .btn{font-family:inherit;font-weight:600;border-radius:8px;border:1px solid transparent;cursor:pointer}
  .sm{font-size:12px;padding:6px 11px}.md{font-size:13px;padding:8px 14px}.lg{font-size:14px;padding:10px 18px}
  .primary{background:var(--accent);color:var(--accent-fg)}
  .secondary{background:var(--surface);color:inherit;border-color:var(--border)}
  .ghost{background:transparent;color:var(--accent)}
  .dis{opacity:.5;cursor:not-allowed}
  input,select{font-family:inherit;font-size:13px;color:inherit;background:var(--field);border:1px solid var(--border);border-radius:8px;padding:9px 11px;min-width:180px}
  input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 22%,transparent)}
  .badge{display:inline-flex;align-items:center;gap:5px;border-radius:7px;padding:3px 9px;font-size:11px;font-weight:600;border:1px solid transparent;font-family:"JetBrains Mono",monospace}
  .empty{border:1px dashed var(--border);background:var(--field);border-radius:10px;padding:16px}
  .empty .t{font-weight:600;font-size:13px}.empty .d{color:var(--muted);font-size:12px;margin-top:3px}
  .error{border:1px solid var(--err-bd);background:var(--err-bg);color:var(--err-fg);border-radius:10px;padding:13px;font-size:12.5px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .error button{font-family:inherit;font-size:11px;font-weight:600;border-radius:7px;border:1px solid currentColor;background:transparent;color:inherit;padding:5px 9px;cursor:pointer}
  .loading{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:12.5px}
  .spin{width:15px;height:15px;border-radius:50%;border:2px solid var(--border);border-top-color:var(--accent);animation:s 1s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="tpl"></div>
<script>
  function pane(mode){return `<div class="pane ${mode}">
    <h1>${mode} theme</h1>
    <h2>Buttons</h2>
    <div class="row"><button class="btn primary sm">Run Scan</button><button class="btn primary md">Run Scan</button><button class="btn primary lg">Run Scan</button></div>
    <div class="row" style="margin-top:8px"><button class="btn secondary md">Clear filters</button><button class="btn ghost md">Refresh</button><button class="btn primary md dis">Running…</button></div>
    <h2>Inputs</h2>
    <div class="row"><input value="benchmarks/fixtures" /><select><option>both</option><option>json</option></select></div>
    <h2>Badges</h2>
    <div class="row">
      <span class="badge" style="color:var(--muted);background:var(--field);border-color:var(--border)">neutral</span>
      <span class="badge" style="color:var(--crit-fg);background:var(--crit-bg);border-color:var(--crit-bd)">CRITICAL</span>
      <span class="badge" style="color:var(--accent);background:color-mix(in srgb,var(--accent) 14%,transparent);border-color:color-mix(in srgb,var(--accent) 35%,transparent)">judge: rule_based</span>
    </div>
    <h2>States</h2>
    <div class="empty" style="margin-bottom:10px"><div class="t">No static scan run yet</div><div class="d">Submit the form above to run your first scan.</div></div>
    <div class="error" style="margin-bottom:10px"><span>Unauthorized (401) — set a valid API token in Settings.</span><button>Open Settings</button></div>
    <div class="loading"><span class="spin"></span> Running static scan…</div>
  </div>`}
  document.getElementById('tpl').innerHTML = '<div class="wrap">'+pane('light')+pane('dark')+'</div>';
</script>
</body>
</html>
